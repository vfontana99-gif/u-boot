name: "CodeQL Advanced"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '19 6 * * 2'

jobs:
  analyze:
    name: Analyze C/C++
    runs-on: ubuntu-20.04
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential bc bison flex libssl-dev swig python3-dev libsdl2-dev uuid-dev pkg-config libgnutls28-dev device-tree-compiler python3-setuptools

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: c-cpp
        queries: ./.github/custom-queries/taint_tracking.ql
        build-mode: manual

    - name: Run manual build steps (Verbose)
      run: |
        make sandbox_defconfig
        make NO_SDL=1 KCFLAGS="-Wno-error" V=1 -j$(nproc)

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:c-cpp"
